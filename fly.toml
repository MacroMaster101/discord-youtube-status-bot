# fly.toml app configuration file generated for discord-youtube-status-bot on 2026-05-22T08:10:25Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'discord-youtube-status-bot'
primary_region = 'iad'

[build]

[deploy]
  strategy = 'rolling'
  wait_timeout = '5m0s'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[checks]
  [checks.health]
    port = 8080
    type = 'http'
    interval = '15s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
